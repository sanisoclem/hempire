name: Haskell

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'docker/backend.Dockerfile'
      - '.github/workflows/haskell.yml'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/haskell.yml'

jobs:
  build-and-test:
    name: Build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.10.3'
          cabal-version: '3.14.2'

      - name: Cache Cabal store
        uses: actions/cache@v4
        with:
          path: |
            ~/.cabal/store
            backend/dist-newstyle
          key: ${{ runner.os }}-cabal-${{ hashFiles('backend/cabal.project.freeze', '.github/workflows/haskell.yml') }}
          restore-keys: ${{ runner.os }}-cabal-

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y librdkafka-dev

      - run: cabal update
      - run: cabal build all
      - run: cabal test all --test-show-details=direct

  docker:
    name: Docker — ${{ matrix.service }}
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service: [crm-api, crm-api-internal, outbox-sender]

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: backend
          file: docker/backend.Dockerfile
          build-args: SERVICE=${{ matrix.service }}
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.service }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}/${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
