services:
  kafka:
    image: apache/kafka:3.9.2
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,PLAINTEXT_INTERNAL://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      - kafka

  postgres:
    image: postgres:16-alpine
    command: postgres -c wal_level=logical
    environment:
      POSTGRES_USER: hempire
      POSTGRES_PASSWORD: hempire
      POSTGRES_DB: crm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-dbs.sh:/docker-entrypoint-initdb.d/init-dbs.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hempire -d crm"]
      interval: 5s
      timeout: 5s
      retries: 10

  zitadel:
    image: ghcr.io/zitadel/zitadel:v2.54.3
    command: start-from-init --masterkey "MasterkeyNeedsToHave32Characters" --tlsMode disabled
    environment:
      ZITADEL_DATABASE_POSTGRES_HOST: postgres
      ZITADEL_DATABASE_POSTGRES_PORT: 5432
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: hempire
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: hempire
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: hempire
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: hempire
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      ZITADEL_EXTERNALSECURE: "false"
      ZITADEL_EXTERNALPORT: 8081
      ZITADEL_EXTERNALDOMAIN: localhost
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy

  zitadel-internal:
    image: ghcr.io/zitadel/zitadel:v2.54.3
    command: start-from-init --masterkey "MasterkeyNeedsToHave32Characters" --tlsMode disabled
    environment:
      ZITADEL_DATABASE_POSTGRES_HOST: postgres
      ZITADEL_DATABASE_POSTGRES_PORT: 5432
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel_internal
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: hempire
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: hempire
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: hempire
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: hempire
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      ZITADEL_EXTERNALSECURE: "false"
      ZITADEL_EXTERNALPORT: 8082
      ZITADEL_EXTERNALDOMAIN: localhost
    ports:
      - "8082:8080"
    depends_on:
      postgres:
        condition: service_healthy

  electric:
    image: electricsql/electric:latest
    environment:
      DATABASE_URL: postgresql://hempire:hempire@postgres:5432/hempire_bff
      LOGICAL_PUBLISHER_HOST: electric
      ELECTRIC_INSECURE: "true"
    ports:
     - "3001:3000"
    depends_on:
      postgres:
        condition: service_healthy

  crm-migrate:
    build:
      context: ./backend/crm/migrations
      dockerfile: Dockerfile
    command: ["postgres://hempire:hempire@postgres:5432/crm?sslmode=disable", "up"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  bff-migrate:
    build:
      context: ./web/migrations
      dockerfile: Dockerfile
    command: ["postgres://hempire:hempire@postgres:5432/hempire_bff?sslmode=disable", "up"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

