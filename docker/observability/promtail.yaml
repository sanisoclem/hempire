server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values: ["com.docker.compose.project"]
    relabel_configs:
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: service
      - source_labels: [__meta_docker_container_name]
        regex: '/?(.*)'
        target_label: container
    pipeline_stages:
      # Parse JSON emitted by fast-logger and extract level as a stream label.
      # trace_id and span_id remain in the stored JSON body so the Grafana
      # Loki datasource can extract them via regex for the "View Trace" link.
      - json:
          expressions:
            level: level
      - labels:
          level:
